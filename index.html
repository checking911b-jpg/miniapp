<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family: Arial, sans-serif; overflow:hidden; }

/* nền ảnh */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://sf-static.upanhlaylink.com/img/image_20260325f9888f2c477fd4a70251cff8ac50dce8.jpg") center/cover no-repeat;
  filter: blur(4px);
  transform: scale(1.05);
}

/* overlay */
.overlay {
  position: fixed;
  width:100%; height:100%;
  background: rgba(0,0,0,0.25);
}

/* container căn giữa màn hình */
.container {
  position:absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  text-align:center;
}

/* icon vẫy tay to */
.icon {
  font-size:120px;
  animation: wave 1.2s infinite;
}

/* animation vẫy tay */
@keyframes wave {
  0% { transform: rotate(0deg); }
  15% { transform: rotate(14deg); }
  30% { transform: rotate(-8deg); }
  45% { transform: rotate(14deg); }
  60% { transform: rotate(-4deg); }
  75% { transform: rotate(10deg); }
  100% { transform: rotate(0deg); }
}

/* text Step 1 với nền trắng */
.step1-text {
  display:inline-block;
  margin-top:20px;
  padding:15px 20px;
  border-radius:12px;
  background: rgba(255,255,255,0.9); /* ô trắng mờ */
  font-size:18px;
  font-weight:500;
  color:#111;
  line-height:1.5;
}

/* nút Xác nhận to bằng text */
.step1-btn {
  margin-top:15px;
  width: calc(100% + 40px); /* rộng bằng ô text + padding */
  max-width:300px;          /* giới hạn chiều rộng */
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#3b9edb;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="overlay"></div>

<!-- Container trung tâm -->
<div class="container" id="step1-container">
  <div class="icon">👋</div>
  <div class="step1-text">
    Bạn cần xác nhận mình là người thật , hãy<br>
    nhấp vào nút bên dưới để bắt đầu!
  </div>
  <button class="step1-btn" onclick="step2()">Xác nhận</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

function step2(){
  // ẩn Step 1
  document.getElementById("step1-container").style.display = "none";
  // hiện Step 2 (nếu có)
}
</script>
</body>
</html>
