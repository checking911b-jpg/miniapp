<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    text-align:center;
}

/* loading full màn */
#loading {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#fff;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.spinner {
    width:40px;
    height:40px;
    border:5px solid #eee;
    border-top:5px solid #2AABEE;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h2 id="title">🤖 Xác minh bạn không phải robot</h2>
function requestPhone() {
    Telegram.WebApp.sendData("request_phone");

    document.body.innerHTML = `
        <h2>Đợi đã, đừng đi ra ngoài</h2>
        <p>⏳ Đang xác minh...</p>
    `;
}

<script>
// nếu đã verify thì bỏ qua
const params = new URLSearchParams(window.location.search);
if (params.get("verified") === "1") {
    document.body.innerHTML = "✅ Xác minh thành công!";
}

function verify() {
    document.querySelector("button").style.display = "none";
    document.getElementById("loading").style.display = "flex";

    setTimeout(() => {
        Telegram.WebApp.close();

        // chuyển bot
        window.location.href = "https://t.me/YOUR_BOT?start=verify";

    }, 1800);
}
</script>

</body>
</html>
