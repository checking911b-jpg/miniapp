<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    text-align:center;
    background:#fff;
}

/* màn chính */
#main {
    margin-top:100px;
}

button {
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#2AABEE;
    color:white;
}

/* màn loading */
#loadingScreen {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#fff;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* icon tệp */
.file-icon {
    width:60px;
    height:70px;
    background:#2AABEE;
    border-radius:8px;
    position:relative;
    margin-bottom:20px;
}

.file-icon::after {
    content:"";
    position:absolute;
    top:0;
    right:0;
    width:20px;
    height:20px;
    background:#fff;
    clip-path: polygon(0 0, 100% 0, 100% 100%);
}

/* loading spinner */
.spinner {
    border:5px solid #eee;
    border-top:5px solid #2AABEE;
    border-radius:50%;
    width:40px;
    height:40px;
    animation:spin 1s linear infinite;
    margin-top:20px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.text {
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="main">
    <h2>🤖 Xác minh bạn không phải robot</h2>
    <button onclick="verify()">✅ Tôi không phải robot</button>
</div>

<!-- loading UI -->
<div id="loadingScreen">
    <div class="file-icon"></div>
    <div class="text">Đợi đã, đừng đi ra ngoài</div>
    <div class="spinner"></div>
</div>

<script>
function verify() {
    // rung nhẹ (tạo cảm giác thật)
    if (Telegram.WebApp.HapticFeedback) {
        Telegram.WebApp.HapticFeedback.impactOccurred("medium");
    }

    // ẩn màn chính
    document.getElementById("main").style.display = "none";

    // hiện loading
    let loading = document.getElementById("loadingScreen");
    loading.style.display = "flex";

    // delay cho giống xử lý thật
    setTimeout(() => {
        Telegram.WebApp.close();
        window.location.href = "https://t.me/YOUR_BOT?start=verify";
    }, 2000);
}
</script>

</body>
</html>
