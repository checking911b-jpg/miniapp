<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family: Arial, sans-serif; overflow:hidden; }

/* nền ảnh */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://sf-static.upanhlaylink.com/img/image_20260325f9888f2c477fd4a70251cff8ac50dce8.jpg") center/cover no-repeat;
  filter: blur(4px);
  transform: scale(1.05);
}

/* overlay mờ */
.overlay {
  position: fixed;
  width:100%; height:100%;
  background: rgba(0,0,0,0.25);
}

/* container căn giữa màn hình */
.container {
  position:absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  text-align:center;
  max-width:360px;
}

/* icon vẫy tay */
.icon {
  font-size:170px;
  animation: wave 1.2s infinite;
}

@keyframes wave {
  0% { transform: rotate(0deg); }
  15% { transform: rotate(14deg); }
  30% { transform: rotate(-8deg); }
  45% { transform: rotate(14deg); }
  60% { transform: rotate(-4deg); }
  75% { transform: rotate(10deg); }
  100% { transform: rotate(0deg); }
}

/* text Step 1 với ô trắng và tự co font-size vừa 2 dòng */
.step1-text {
  display: inline-block;
  margin-top:20px;
  padding:18px 25px;
  border-radius:15px;
  background: rgba(255,255,255,0.9);
  font-size: 20px;
  font-weight:500;
  color:#111;
  line-height:1.4;
  text-align:center;
  max-width:100%;
  white-space: normal;
  overflow: hidden;
}

/* JavaScript sẽ tự giảm font nếu vượt quá 2 dòng */
.step1-text[data-adjust] {
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2; /* chỉ 2 dòng */
  overflow: hidden;
  text-overflow: ellipsis;
}

/* nút Xác nhận rộng bằng text */
.step1-btn {
  margin-top:20px;
  padding:16px;
  font-size:19px;
  font-weight:600;
  border:none;
  border-radius:12px;
  background:#3b9edb;
  color:#fff;
  cursor:pointer;
  display:inline-block;
  min-width: 100%;
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="overlay"></div>

<div class="container" id="step1-container">
  <div class="icon">👋</div>
  <div class="step1-text" id="step1-text" data-adjust>
Bạn cần xác nhận mình là người thật, nhấp vào nút bên dưới để bắt đầu truy cập vào các tệp hoàn toàn miễn phí. Hãy làm theo hướng dẫn để mở bước tiếp theo.
  </div>
  <button class="step1-btn" onclick="step2()">Xác nhận</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

// Step 2
function step2(){
  document.getElementById("step1-container").style.display = "none";
  // Step 2 sẽ xuất hiện
}

// Tự điều chỉnh font-size để vừa 2 dòng
function adjustFont(){
  const el = document.getElementById("step1-text");
  let font = 20;
  el.style.fontSize = font+"px";
  while(el.scrollHeight > el.clientHeight && font > 12){
    font -= 1;
    el.style.fontSize = font+"px";
  }
}

window.onload = adjustFont;
window.onresize = adjustFont;
</script>
</body>
</html>
